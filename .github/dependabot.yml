# Dependabot Configuration
# Automatic dependency updates for all package ecosystems

version: 2
updates:
  # npm - JavaScript/TypeScript
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "antonioneto19"
    assignees:
      - "antonioneto19"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
      include: "scope"
    allow:
      - dependency-type: "all"
    rebase-strategy: "auto"

  # Python - pip
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    reviewers:
      - "antonioneto19"
    assignees:
      - "antonioneto19"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps): "

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    reviewers:
      - "antonioneto19"
    labels:
      - "dependencies"
      - "docker"
      - "devops"
    commit-message:
      prefix: "chore(docker): "

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "11:00"
      timezone: "UTC"
    reviewers:
      - "antonioneto19"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci): "
